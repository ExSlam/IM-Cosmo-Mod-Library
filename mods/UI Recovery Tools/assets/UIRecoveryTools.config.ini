# UIRecoveryTools configuration
#
# Set each hotkey to a single Unity KeyCode name, for example: Home, End, BackQuote, Insert.
# Set to NONE to disable that hotkey.
#
# Default choices below are single-key and are not used by Idol Manager base-game hotkeys.
clear_blur_key=KeypadDivide
toggle_overlay_key=KeypadMultiply
# Auto clear stale blur/backdrop when no popup is active (helps broken saves).
auto_recover_enabled=true
# Auto recover interval in seconds (0.25 to 15).
auto_recover_interval_seconds=1.0
